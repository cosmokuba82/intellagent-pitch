<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntelAgent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@300;400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: #090806;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Particle canvas */
  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* Subtle center glow */
  .glow {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(196,154,62,0.055) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Main layout */
  main {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 32px;
    text-align: center;
  }

  /* Brand */
  .brand {
    font-family: 'Manrope', sans-serif;
    font-size: clamp(56px, 11vw, 108px);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    padding-bottom: 6px;
    margin-bottom: 20px;
    opacity: 0;
    animation: rise 1s cubic-bezier(0.22,1,0.36,1) forwards 0.1s;
  }
  .brand .w { color: #f2ece0; }
  .brand .g { color: #c49a3e; }

  /* Gold line under brand */
  .rule {
    width: 36px;
    height: 1px;
    background: #c49a3e;
    opacity: 0.35;
    margin: 0 auto 40px;
    opacity: 0;
    animation: fade 0.8s ease forwards 0.6s;
  }

  /* Taglines */
  .lines {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 64px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) forwards 0.5s;
  }
  .line {
    font-size: clamp(15px, 2.2vw, 20px);
    font-weight: 300;
    letter-spacing: 0.01em;
    color: rgba(242,236,224,0.5);
  }
  .line.accent { color: rgba(196,154,62,0.75); }

  /* CTA */
  .enter {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(242,236,224,0.35);
    text-decoration: none;
    border-bottom: 1px solid rgba(242,236,224,0.12);
    padding-bottom: 3px;
    transition: color 0.3s, border-color 0.3s;
    opacity: 0;
    animation: fade 1s ease forwards 1.1s;
  }
  .enter:hover {
    color: rgba(196,154,62,0.9);
    border-color: rgba(196,154,62,0.4);
  }
  .enter svg { transition: transform 0.3s; }
  .enter:hover svg { transform: translateX(5px); }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<div class="glow"></div>
<canvas id="c"></canvas>

<main>
  <div class="brand">
    <span class="w">Intel</span><span class="g">Agent</span>
  </div>

  <div class="rule"></div>

  <div class="lines">
    <div class="line">Self-learning.</div>
    <div class="line">Self-evolving.</div>
    <div class="line accent">Reaching out to you.</div>
  </div>

  <a href="pitch.html" class="enter">
    Enter
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</main>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function spawn() {
    pts = [];
    const n = Math.floor((W * H) / 14000);
    for (let i = 0; i < n; i++) {
      pts.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18,
        r: Math.random() * 1.1 + 0.3,
        a: Math.random() * 0.5 + 0.1
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    pts.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(196,154,62,${p.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize();
  spawn();
  window.addEventListener('resize', () => { resize(); spawn(); });
  draw();
</script>

</body>
</html>
